    target: [ADR-CRUX-002, ADR-CRUX-009]
    finding: |
      ADR-002 + ADR-009 hidden compounding: cost log CSV vs trace cache
      SQLite, neither names where the cost log eventually lives.
    suggests: |
      (Original.) Add a clause to one of the ADRs scoping the cost log
      explicitly.
    resolution: |
      ADR-CRUX-009 amended with a "Storage scope" clause: cost ledger
      stays in CSV form at v1.0; trace cache is scoped to the trace
      graph only; lifting cost ledger to SQLite is a v1.1+ consideration
      gated on observed query-time pain. New consequence captured: cost
      ledger format and trace cache format are intentionally separate
      at v1.0; cross-query joins are not v1.0 functionality.
    resolved: true
    resolved_by: architect
    resolved_at: 2026-05-05T00:00:00Z

