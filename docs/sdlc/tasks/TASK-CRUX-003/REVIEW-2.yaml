adr_002_follow_up_assessment: |
  The cycle-1 HIGH-3 finding (FIFO gap) is correctly resolved.

  Walk-through of the new isPostScan phase tracker:

  Phase A (pre-scan): isProcessing=true, isPostScan=false.
    enqueuePass() -> scheduleItem() hits the !isPostScan branch -> resolver
    attached to the in-flight item's resolve chain, no new queue entry.
    Writes arriving here are captured by the upcoming scanArtifacts call.

  isPostScan = true is set immediately after onPassStart() returns, before
  scanArtifacts(). This is the correct sentinel point.

  Phase B (post-scan): isPostScan=true.
    enqueuePass() -> scheduleItem() hits the post-scan branch.
    If queue.length < 2, a new WorkItem is pushed as queue[1] (the follow-up).
    If queue.length >= 2, the caller's resolver is coalesced onto the existing
    follow-up item. Bounded depth at 2 slots: compliant with the design.

  After in-flight pass settles: queue.shift(), isProcessing=false, isPostScan=false,
  resolveNotify() fires, then processQueue() runs queue[0] (the follow-up).

  The Section 8b test (indexer.test.ts) exercises the critical path: onAfterScan
  fires after scanArtifacts() has run (isPostScan=true at that point), calls
  enqueuePass(), which correctly creates queue[1]. REQ-SCAN-B is absent from
  pass-1's scan, then picked up by the follow-up pass. The test passes deterministically
  because onAfterScan is injected at the exact post-scan hook point.

  ADR-CRUX-002 contract ("If a write arrives while a pass is running, a follow-up
  pass is enqueued to run after the current pass commits") is now correctly
  implemented for writes arriving after the scan phase. Writes arriving during
  onPassStart (pre-scan) are still folded into the current pass — a valid and
  documented optimization consistent with the ADR's intent.

  Residual note (not blocking): onAfterScan is marked @internal in JSDoc but
  is part of the exported IndexerOptions interface and re-exported from index.ts.
  It is therefore part of the public API surface. This is a deliberate test-seam
  design choice and acceptable for v1 given the annotation, but a future cleanup
  could hide it behind a separate internal factory overload.

