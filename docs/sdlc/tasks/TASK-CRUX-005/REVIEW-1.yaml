silent_failure_analysis:
  mutex_stuck_queue: |
    CLEAN. The shadow chain stored in mutexMap uses `.then(() => {}, () => {})` — both
    handlers resolve to undefined. A synchronous throw from fs.openSync/writeSync propagates
    to the caller (prior.then(fn) rejects), but the mutex chain stored for the next caller
    always resolves. Verified by code trace and runtime test.
  split_csv_rows_embedded_newline: |
    CLEAN. The toggle-based inQuotes approach works correctly for all valid RFC 4180 inputs.
    Every `""` pair contributes an even number of toggles (net neutral), so embedded newlines
    inside quoted fields are not mistaken for row separators. Verified for:
    — simple embedded newline: "line one\nline two"
    — escaped double-quote + embedded newline: "said ""hello""\nline two"
    — field starting with escaped quote: """quoted""\nwith newline"
  read_ledger_missing_file: |
    CLEAN. readLedger checks fs.existsSync before reading; returns [] for missing file.
    No throw, no silent error — explicit and correct.
  create_halt_ladder_soft_warn_once: |
    CLEAN. softWarnEmitted boolean gate ensures softWarn fires exactly once on first crossing.
    Both "before crossing" (false) and "after first emission" (false on repeat) are tested.
  auto_stop_repeated_accrue: |
    CLEAN. After auto-stop (confirmsCount ≥ MAX_CONFIRMS), every subsequent accrue that
    crosses the ceiling returns halt=true + autoStop=true. No freeze, no silent failure.
    Behavior is consistent and deterministic.
  cross_process_concurrency: |
    ACKNOWLEDGED LIMITATION. The mutexMap is in-process state only. Concurrent writes
    from multiple Node.js processes to the same log.csv would not be serialized.
    The module comment documents "in-process mutex" explicitly. ADR-CRUX-009 does not
    require cross-process safety at v1.0. This is not a defect at current scope.

