question: |
  What is the canonical source of truth for the trace graph -- the
  markdown/YAML files in docs/sdlc/, or the SQLite index? (a) cache
  invalidation rules if SQLite is a cache; (b) what "plain markdown in your
  repo" means if SQLite is authoritative; (c) tie-breaker on disagreement.
